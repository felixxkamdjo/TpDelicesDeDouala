<article class="card">
  <div class="card-image">
    <img [src]="restaurant().imageUrl" [alt]="restaurant().name" />
  </div>

  <div class="card-body">
    <h3>{{ restaurant().name }}</h3>
    <p class="specialty">Spécialité : {{ restaurant().specialty }}</p>
    <span class="tag-location">{{ restaurant().location }}</span>

    <app-star-rating
      [currentRating]="restaurant().currentRating"
      (ratingChanged)="onRatingChanged($event)">
    </app-star-rating>
  </div>
</article>
